version: 2
updates:
  # Maven dependencies for the Spring Boot backend.
  - package-ecosystem: maven
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      backend-minor-and-patch:
        update-types:
          - minor
          - patch

  # npm dependencies for the Create React App frontend.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      frontend-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-and-patch:
        update-types:
          - minor
          - patch
