name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege: CI only needs to read repository contents.
permissions:
  contents: read

# Cancel superseded runs for the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven, JDK 17)
    runs-on: ubuntu-latest
    # Every run step in this job executes inside backend/ (Maven module root).
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          # Cache the local ~/.m2 repository keyed off pom.xml files.
          cache: maven

      # No mvnw wrapper in this repo, so use the system Maven from setup-java.
      # -B (batch, non-interactive) + -ntp (no transfer progress) keep logs clean.
      - name: Build and test
        run: mvn -B -ntp verify

  frontend:
    name: Frontend (Vite, Node 20)
    runs-on: ubuntu-latest
    # Every run step in this job executes inside frontend/ (Vite app root).
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          # Cache key path is relative to the repo root, not the working-directory.
          cache-dependency-path: frontend/package-lock.json

      # Clean, reproducible install from the committed lockfile.
      # --legacy-peer-deps: some deps (e.g. @types/react 19 vs React 18) still
      # declare mismatched peers; strict `npm ci` would reject the conflict.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # `npm test` → `vitest run`: a single, non-watching run that exits non-zero
      # on any test failure (fails the job).
      - name: Test
        run: npm test

      # `npm run build` → `vite build`. Vite doesn't treat lint warnings as
      # errors, so no CI=false dance is needed.
      - name: Build
        run: npm run build
