name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege: CI only needs to read repository contents.
permissions:
  contents: read

# Cancel superseded runs for the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven, JDK 17)
    runs-on: ubuntu-latest
    # Every run step in this job executes inside backend/ (Maven module root).
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          # Cache the local ~/.m2 repository keyed off pom.xml files.
          cache: maven

      # No mvnw wrapper in this repo, so use the system Maven from setup-java.
      # -B (batch, non-interactive) + -ntp (no transfer progress) keep logs clean.
      - name: Build and test
        run: mvn -B -ntp verify

  frontend:
    name: Frontend (Create React App, Node 20)
    runs-on: ubuntu-latest
    # Every run step in this job executes inside frontend/ (CRA app root).
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          # Cache key path is relative to the repo root, not the working-directory.
          cache-dependency-path: frontend/package-lock.json

      # Clean, reproducible install from the committed lockfile.
      # --legacy-peer-deps: react-scripts 5 (CRA) peers TypeScript 3/4 but the
      # project uses TS 5; strict `npm ci` rejects the conflict (CRA's known fix).
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # CI=true forces a single, non-watching test run (CRA otherwise watches).
      - name: Test
        run: CI=true npm test -- --watchAll=false

      # CI=false: GitHub sets CI=true globally, which makes CRA treat lint
      # warnings as build errors. Disable it for the build step only so warnings
      # don't fail the build (the Test step above still runs under CI=true).
      - name: Build
        run: CI=false npm run build
