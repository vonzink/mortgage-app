# ─────────────────────────────────────────────────────────────────
# Dev profile: H2 in-memory in PostgreSQL-compat mode.
# Schema is owned by Flyway migrations under classpath:db/migration.
# Activate with: -Dspring.profiles.active=dev (or SPRING_PROFILES_ACTIVE=dev)
# ─────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate dialect: use Postgres so generated SQL matches what prod will see.
# H2 understands enough Postgres syntax in MODE=PostgreSQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway runs migrations on startup; JPA validates the resulting schema.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Turn OFF the legacy schema.sql replay (file is deleted; this is paranoia)
spring.sql.init.mode=never

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=INFO
