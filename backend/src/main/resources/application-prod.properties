# ─────────────────────────────────────────────────────────────────
# Prod profile: AWS RDS Postgres. All secrets MUST come from env vars.
# Activate with: -Dspring.profiles.active=prod (or SPRING_PROFILES_ACTIVE=prod)
#
# Required env vars in prod:
#   DB_HOST, DB_PORT (5432), DB_NAME, DB_USERNAME, DB_PASSWORD
#   APP_ENCRYPTION_KEY (32-byte base64)
#   COGNITO_USER_POOL_ID, COGNITO_CLIENT_ID
#   CORS_ALLOWED_ORIGINS  (e.g. https://apply.msfgco.com)
# ─────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway is the source of schema truth in prod; JPA only validates.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.jpa.show-sql=false

# Tighter security headers in prod
server.error.include-stacktrace=never
server.error.include-message=never

# Production S3 bucket
aws.s3.documents-bucket=${AWS_S3_DOCUMENTS_BUCKET:msfg-mortgage-app-documents-prod}

# Folder AI evaluation guardrails (V25). Tenant toggle ships OFF in V25's
# app_settings seed; admin flips it in /admin/settings. API keys are env-only,
# enforced via LlmConfig — missing key disables that provider in the registry.
# Override any of these via the matching env var (e.g. APP_LLM_MONTHLY_USD_CAP).
app.llm.monthly-usd-cap=100
app.llm.per-eval-token-hard-cap=100000
app.llm.max-pages-per-eval=150
app.min-extracted-chars-per-page=50
app.llm.allow-deepseek-in-prod=false

logging.level.com.msfg.mortgage=INFO
logging.level.org.springframework.security=INFO
