# ─────────────────────────────────────────────────────────────────
# Common (loaded for every profile)
# Profile-specific overrides live in application-{profile}.properties
# Active profile: -Dspring.profiles.active=dev|prod  (default: dev)
# ─────────────────────────────────────────────────────────────────

spring.profiles.default=dev

# Server Configuration
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api
spring.application.name=mortgage-loan-app

# Application Configuration
app.name=mortgage-loan-app
app.version=1.0.0
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JPA Configuration (DB-agnostic settings; dialect set per-profile)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# File upload limits (the borrower-portal flow uploads directly to S3 via presigned URL,
# so multipart limits only apply to legacy multi-part endpoints — kept lean.)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ─────────────────────────────────────────────────────────────────
# AWS S3 documents bucket — single bucket for the entire mortgage-app.
# Bucket name overridden per env. Keys follow:
#   applications/{application_id}/{party_role}/{document_type}/{doc_id}-{safe_filename}
#   loans/{loan_id}/{party_role}/{document_type}/{doc_id}-{safe_filename}
# ─────────────────────────────────────────────────────────────────
aws.region=${AWS_REGION:us-west-1}
aws.s3.documents-bucket=${AWS_S3_DOCUMENTS_BUCKET:msfg-mortgage-app-documents-dev}
aws.s3.presigned-url-ttl-seconds=${AWS_S3_PRESIGNED_TTL:900}

# ─────────────────────────────────────────────────────────────────
# AWS Cognito (shared with dashboard.msfgco.com — same user pool)
# ─────────────────────────────────────────────────────────────────
cognito.region=${COGNITO_REGION:us-west-1}
cognito.user-pool-id=${COGNITO_USER_POOL_ID:us-west-1_S6iE2uego}
cognito.client-id=${COGNITO_CLIENT_ID:2t9edrhu5crf8vq3ivigv6jopf}

# Resource server JWT validation — issuer URI auto-discovers JWK set.
# Must be the full Cognito IdP endpoint with `.amazonaws.com`.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.${cognito.region}.amazonaws.com/${cognito.user-pool-id}

# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Go HighLevel API Configuration
ghl.api.url=${GHL_API_URL:https://rest.gohighlevel.com/v1}
ghl.api.key=${GHL_API_KEY:}

# Encryption key for sensitive data (SSN) — MUST be overridden via env in prod
app.encryption.key=${APP_ENCRYPTION_KEY:change-this-to-secure-key-dev-only}

# Logging Configuration
logging.level.com.msfg.mortgage=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
