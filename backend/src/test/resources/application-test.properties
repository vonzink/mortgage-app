# ─────────────────────────────────────────────────────────────────
# Test profile: H2 in-memory in PostgreSQL-compat mode.
# Schema is owned by Flyway (same path as dev/prod) so V19/V21 seed data
# (document_types, folder_templates) is available to tests.
# Activated via @ActiveProfiles("test") on test classes — Boot 3 rejects
# spring.profiles.active inside a profile-specific resource.
# ─────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Match dev/prod: Postgres dialect over H2 in PostgreSQL mode.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway runs the same migrations as prod; JPA validates afterwards.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# Legacy schema.sql auto-run conflicts with Flyway — turn it off.
spring.sql.init.mode=never

# Logging — quiet by default; the failing-test diff is what we want to see.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.com.yourcompany.mortgage=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=WARN

# Test specific settings
app.test.mode=true
