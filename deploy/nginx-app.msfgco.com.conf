# /etc/nginx/sites-available/app.msfgco.com.conf
#
# Drop this in alongside the existing nginx site files on the EC2 box, then:
#   sudo ln -s /etc/nginx/sites-available/app.msfgco.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS via certbot:
#   sudo certbot --nginx -d app.msfgco.com
# (certbot rewrites the listen directives in place; this file is the pre-TLS
# template. Keep a copy of the post-certbot version once it's been edited.)

server {
    listen 80;
    listen [::]:80;
    server_name app.msfgco.com;

    # Backend API — proxied to the dockerized Spring Boot container that
    # binds to 127.0.0.1:8081. Container does its own /api context-path,
    # so /api/* on the wire maps 1:1.
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        # Document uploads: borrower presigns a PUT, then PUTs to S3 directly,
        # so request bodies through nginx stay small. Keep the limit modest.
        client_max_body_size 10m;
    }

    # Static frontend bundle from `npm run build`. The build step on the
    # server (or a CI runner) writes here; nginx serves it directly.
    root /home/ubuntu/apps/mortgage-app/frontend/build;
    index index.html;

    # CRA produces hashed filenames in /static/* — they're immutable, cache hard.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unknown path serves the React shell so client-side
    # routing (react-router) handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tighten a couple of common headers (nginx only sets these per-server).
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    access_log /var/log/nginx/app.msfgco.com.access.log;
    error_log  /var/log/nginx/app.msfgco.com.error.log;
}
